<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Phase labels -->
<text x="40" y="32" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:#3D3D3A">一期</text>
<text x="40" y="48" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#3D3D3A">核心体验</text>
<text x="270" y="32" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:#3D3D3A">二期</text>
<text x="270" y="48" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#3D3D3A">个性化</text>
<text x="500" y="32" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:#3D3D3A">三期</text>
<text x="500" y="48" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#3D3D3A">数据回顾</text>

<!-- Phase dividers -->
<line x1="250" y1="24" x2="250" y2="520" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="480" y1="24" x2="480" y2="520" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- === PHASE 1: 核心体验 === -->

<!-- 语料库 -->
<g>
  <rect x="30" y="64" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="84" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#3C3489">语料库</text>
  <text x="130" y="102" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#534AB7">AI 提取 + 人工终审</text>
</g>

<!-- 每日名句 -->
<g>
  <rect x="30" y="148" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#3C3489">每日名句</text>
  <text x="130" y="186" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#534AB7">小/中/大三种组件</text>
</g>

<!-- 心情标签 -->
<g>
  <rect x="30" y="232" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="252" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#3C3489">心情标签</text>
  <text x="130" y="270" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#534AB7">八种心情匹配筛选</text>
</g>

<!-- 现代宜忌 -->
<g>
  <rect x="30" y="316" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="336" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#3C3489">现代宜忌</text>
  <text x="130" y="354" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#534AB7">生成式，每日不重样</text>
</g>

<!-- 节假日匹配 -->
<g>
  <rect x="30" y="400" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="420" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#3C3489">节假日匹配</text>
  <text x="130" y="438" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#534AB7">节日信号影响选句</text>
</g>

<!-- Phase 1 arrows -->
<line x1="130" y1="116" x2="130" y2="148" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5" fill="none"/>
<line x1="130" y1="200" x2="130" y2="232" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5" fill="none"/>
<line x1="130" y1="284" x2="130" y2="316" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5" fill="none"/>
<line x1="130" y1="368" x2="130" y2="400" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5" fill="none"/>

<!-- === PHASE 2: 个性化 === -->

<!-- 天气 + 位置 -->
<g>
  <rect x="260" y="64" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="360" y="84" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#085041">天气 + 位置</text>
  <text x="360" y="102" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#0F6E56">App 传坐标，Edge 查天气</text>
</g>

<!-- 月历情绪视图 -->
<g>
  <rect x="260" y="148" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="360" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#085041">月历情绪视图</text>
  <text x="360" y="186" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#0F6E56">整月心情图标汇总</text>
</g>

<!-- 小组件主题定制 -->
<g>
  <rect x="260" y="232" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="360" y="252" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#085041">小组件主题定制</text>
  <text x="360" y="270" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#0F6E56">字体 / 配色 / 留白</text>
</g>

<!-- 纪念日信号 -->
<g>
  <rect x="260" y="316" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="360" y="336" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#085041">纪念日信号</text>
  <text x="360" y="354" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#0F6E56">生日/纪念日影响选句</text>
</g>

<!-- 体裁筛选 -->
<g>
  <rect x="260" y="400" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="360" y="420" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#085041">体裁筛选</text>
  <text x="360" y="438" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#0F6E56">按 genre 匹配偏好</text>
</g>

<!-- === PHASE 3: 数据回顾 === -->

<!-- 年度回顾 -->
<g>
  <rect x="490" y="64" width="180" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="580" y="84" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#712B13">年度回顾</text>
  <text x="580" y="102" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#993C1D">可分享长图</text>
</g>

<!-- 年历热力图 -->
<g>
  <rect x="490" y="148" width="180" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="580" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;fill:#712B13">年历热力图</text>
  <text x="580" y="186" text-anchor="middle" dominant-baseline="central" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#993C1D">52 周情绪色块</text>
</g>

<!-- Phase 3 arrow -->
<line x1="580" y1="116" x2="580" y2="148" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5" fill="none"/>

<!-- Cross-phase dependency arrows (dashed) -->
<!-- 现代宜忌 → 天气+位置 -->
<path d="M230 342 L256 342 L256 90 L260 90" fill="none" stroke="#737268" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<!-- 节假日匹配 → 纪念日信号 -->
<line x1="230" y1="426" x2="260" y2="342" fill="none" stroke="#737268" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<!-- 月历情绪视图 → 年历热力图 -->
<line x1="460" y1="174" x2="490" y2="174" fill="none" stroke="#737268" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="30" y="500" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7"/>
<text x="48" y="511" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#3D3D3A">一期必做</text>
<rect x="120" y="500" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="138" y="511" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#3D3D3A">二期个性化</text>
<rect x="228" y="500" width="12" height="12" rx="3" fill="#FAECE7" stroke="#993C1D"/>
<text x="246" y="511" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;fill:#3D3D3A">三期回顾</text>
<text x="320" y="511" style="font-family:'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif;font-size:11px;fill:rgba(31,30,29,0.5)">虚线 = 跨期依赖</text>

</svg>
