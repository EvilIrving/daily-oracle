<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quote Widget v2</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-serif: Georgia, "Times New Roman", serif;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4f0;
    --color-background-tertiary: #eeece7;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #4a4a46;
    --color-text-tertiary: #9a9890;
    --color-border-tertiary: rgba(0,0,0,0.1);
    --color-border-secondary: rgba(0,0,0,0.18);
    --color-border-primary: rgba(0,0,0,0.3);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #252522;
      --color-background-tertiary: #2e2e2b;
      --color-text-primary: #f0ede6;
      --color-text-secondary: #b0ada6;
      --color-text-tertiary: #6a6860;
      --color-border-tertiary: rgba(255,255,255,0.08);
      --color-border-secondary: rgba(255,255,255,0.15);
      --color-border-primary: rgba(255,255,255,0.25);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--color-background-tertiary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .phone {
    width: 300px;
    background: var(--color-background-secondary);
    border-radius: 42px;
    border: 0.5px solid var(--color-border-secondary);
    padding: 18px 14px 24px;
  }

  .notch {
    width: 72px; height: 20px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 10px;
    margin: 0 auto 14px;
  }

  .widget {
    background: var(--color-background-primary);
    border-radius: 24px;
    padding: 22px 20px 18px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    user-select: none;
  }

  .date {
    font-size: 10px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .quote-block {
    flex: 1;
    margin-bottom: 16px;
  }

  .quote {
    font-family: var(--font-serif);
    font-size: 14px;
    line-height: 1.85;
    color: var(--color-text-primary);
    font-weight: 400;
  }

  .quote.en { font-style: italic; }

  .author {
    font-size: 10px;
    color: var(--color-text-tertiary);
    margin-top: 10px;
    text-align: right;
    letter-spacing: 0.02em;
  }

  .rule {
    height: 0.5px;
    background: var(--color-border-tertiary);
    margin-bottom: 14px;
  }

  .almanac { margin-bottom: 14px; }

  .alm-row {
    display: flex;
    align-items: baseline;
    gap: 7px;
    margin-bottom: 6px;
    font-size: 11px;
    line-height: 1.5;
  }
  .alm-row:last-child { margin-bottom: 0; }

  .alm-key {
    font-size: 10px;
    font-weight: 500;
    color: var(--color-text-tertiary);
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  .alm-val { color: var(--color-text-secondary); }

  .mood-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
  }

  .mood-hint { font-size: 10px; color: var(--color-text-tertiary); }

  .moods { display: flex; gap: 4px; }

  .m {
    font-size: 11px;
    color: var(--color-text-tertiary);
    padding: 3px 6px;
    border-radius: 5px;
    border: 0.5px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }

  .m:hover { color: var(--color-text-secondary); border-color: var(--color-border-tertiary); }
  .m.on { color: var(--color-text-primary); border-color: var(--color-border-primary); }

  .hint {
    font-size: 9px;
    color: var(--color-text-tertiary);
    text-align: center;
    margin-top: 9px;
    letter-spacing: 0.03em;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .appear { animation: appear 0.35s ease both; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="widget" onclick="next()">

    <div class="date" id="dt"></div>

    <div class="quote-block">
      <div class="quote appear" id="q"></div>
      <div class="author appear" id="au"></div>
    </div>

    <div class="rule"></div>

    <div class="almanac">
      <div class="alm-row">
        <span class="alm-key">宜</span>
        <span class="alm-val appear" id="yi"></span>
      </div>
      <div class="alm-row">
        <span class="alm-key">忌</span>
        <span class="alm-val appear" id="ji"></span>
      </div>
    </div>

    <div class="mood-bar">
      <span class="mood-hint">心情</span>
      <div class="moods">
        <span class="m" data-k="calm"    onclick="mood(event,'calm')">平静</span>
        <span class="m" data-k="happy"   onclick="mood(event,'happy')">愉悦</span>
        <span class="m" data-k="sad"     onclick="mood(event,'sad')">低落</span>
        <span class="m" data-k="anxious" onclick="mood(event,'anxious')">焦虑</span>
        <span class="m" data-k="angry"   onclick="mood(event,'angry')">烦躁</span>
      </div>
    </div>

  </div>
  <div class="hint">点击换一句 · 选心情匹配名句</div>
</div>

<script>
const Q = {
  calm: [
    { t: "Rivers know this: there is no hurry. We shall get there some day.", lang:"en", a:"A.A. Milne — Winnie-the-Pooh" },
    { t: "以无事取天下。", lang:"zh", a:"老子《道德经》" },
    { t: "Not all those who wander are lost.", lang:"en", a:"J.R.R. Tolkien — The Fellowship of the Ring" },
    { t: "心静而后能定，定而后能安，安而后能虑，虑而后能得。", lang:"zh", a:"《大学》" },
    { t: "Simplicity is the ultimate sophistication.", lang:"en", a:"Leonardo da Vinci" },
    { t: "万物并作，吾以观复。", lang:"zh", a:"老子《道德经》" },
  ],
  happy: [
    { t: "To live is the rarest thing in the world. Most people exist, that is all.", lang:"en", a:"Oscar Wilde" },
    { t: "一日之计在于晨，一年之计在于春。", lang:"zh", a:"萧绎《纂要》" },
    { t: "There is some good in this world, and it's worth fighting for.", lang:"en", a:"J.R.R. Tolkien — The Two Towers" },
    { t: "庭下如积水空明，水中藻荇交横，盖竹柏影也。", lang:"zh", a:"苏轼《记承天寺夜游》" },
    { t: "I took a deep breath and listened to the old brag of my heart: I am, I am, I am.", lang:"en", a:"Sylvia Plath — The Bell Jar" },
  ],
  sad: [
    { t: "The world breaks everyone and afterward many are strong at the broken places.", lang:"en", a:"Ernest Hemingway — A Farewell to Arms" },
    { t: "问君能有几多愁，恰似一江春水向东流。", lang:"zh", a:"李煜《虞美人》" },
    { t: "多情自古伤离别，更那堪、冷落清秋节。", lang:"zh", a:"柳永《雨霖铃》" },
    { t: "此情可待成追忆，只是当时已惘然。", lang:"zh", a:"李商隐《锦瑟》" },
    { t: "It was the best of times, it was the worst of times.", lang:"en", a:"Charles Dickens — A Tale of Two Cities" },
    { t: "剪不断，理还乱，是离愁。别是一般滋味在心头。", lang:"zh", a:"李煜《相见欢》" },
  ],
  anxious: [
    { t: "You can't go back and change the beginning, but you can start where you are and change the ending.", lang:"en", a:"C.S. Lewis" },
    { t: "知止而后有定，定而后有静，静而后能安。", lang:"zh", a:"《大学》" },
    { t: "I am not afraid of storms, for I am learning how to sail my ship.", lang:"en", a:"Louisa May Alcott — Little Women" },
    { t: "致虚极，守静笃。", lang:"zh", a:"老子《道德经》" },
    { t: "Do not anticipate trouble, or worry about what may never happen. Keep in the sunlight.", lang:"en", a:"Benjamin Franklin" },
  ],
  angry: [
    { t: "Holding on to anger is like grasping a hot coal with the intent of throwing it at someone else; you are the one who gets burned.", lang:"en", a:"Gautama Buddha" },
    { t: "君子不怨天，不尤人。", lang:"zh", a:"《论语·宪问》" },
    { t: "Speak when you are angry and you will make the best speech you will ever regret.", lang:"en", a:"Ambrose Bierce" },
    { t: "上善若水，水善利万物而不争。", lang:"zh", a:"老子《道德经》" },
    { t: "Anyone can become angry — that is easy. But to be angry with the right person, to the right degree, at the right time, for the right purpose, and in the right way — this is not easy.", lang:"en", a:"Aristotle — Nicomachean Ethics" },
  ],
};

const ALM = [
  { yi:"独处时，关掉所有背景音，听自己在想什么", ji:"用刷手机填满每一个空隙" },
  { yi:"散步时不戴耳机，让脚步决定节奏", ji:"把未做的事在脑子里反复排演" },
  { yi:"做一件手边的小事，把它做完整", ji:"在疲惫时做需要判断力的决定" },
  { yi:"给久未联系的人发一句话，不用解释为何消失", ji:"把别人的沉默当作针对自己的信号" },
  { yi:"煮一顿饭，闻食材的气味，不要开着视频", ji:"将自我价值压在他人这一天的态度上" },
  { yi:"在自然光下读几页纸质书", ji:"睡前看令人警觉的信息" },
  { yi:"说出今天一件让你轻松的小事", ji:"用效率评判所有时间的意义" },
  { yi:"主动说出你真实的需要", ji:"以「不想麻烦别人」为由压下去" },
  { yi:"允许自己无所事事一小会儿", ji:"把休息当作一种需要被证明的特权" },
  { yi:"把今天的某个遗憾写下来，然后合上本子", ji:"在床上把今天不顺的事想第二遍" },
  { yi:"出门走一段不常走的路，看陌生的窗口", ji:"以懒为由回避真正想做的事" },
  { yi:"找到一件事做到极致，哪怕只有十分钟", ji:"同时开七个标签页然后哪个都没看完" },
];

let cur = null;
const used = { calm:[], happy:[], sad:[], anxious:[], angry:[], all:[] };

function pick(arr, key) {
  if (used[key].length === arr.length) used[key] = [];
  let idx;
  do { idx = Math.floor(Math.random() * arr.length); }
  while (used[key].includes(idx));
  used[key].push(idx);
  return arr[idx];
}

function pickAlm() {
  return ALM[Math.floor(Math.random() * ALM.length)];
}

function render(q, alm) {
  const qEl = document.getElementById('q');
  qEl.className = 'quote appear ' + (q.lang === 'en' ? 'en' : '');
  qEl.textContent = q.t;
  document.getElementById('au').textContent = '— ' + q.a;
  document.getElementById('yi').textContent = alm.yi;
  document.getElementById('ji').textContent = alm.ji;
}

function next() {
  const pool = cur ? Q[cur] : Object.values(Q).flat();
  const key = cur || 'all';
  const q = pick(pool, key);
  render(q, pickAlm());
}

function mood(e, k) {
  e.stopPropagation();
  const same = cur === k;
  cur = same ? null : k;
  document.querySelectorAll('.m').forEach(m => m.classList.toggle('on', m.dataset.k === cur));
  next();
}

const now = new Date();
const days = ['日','一','二','三','四','五','六'];
document.getElementById('dt').textContent =
  `${now.getFullYear()} · ${now.getMonth()+1}月${now.getDate()}日 · 星期${days[now.getDay()]}`;

next();
</script>
</body>
</html>
