<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Sizes Spec</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-serif: Georgia, "Times New Roman", serif;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4f0;
    --color-background-tertiary: #eeece7;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #4a4a46;
    --color-text-tertiary: #9a9890;
    --color-border-tertiary: rgba(0,0,0,0.1);
    --color-border-secondary: rgba(0,0,0,0.18);
    --color-border-primary: rgba(0,0,0,0.3);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #252522;
      --color-background-tertiary: #2e2e2b;
      --color-text-primary: #f0ede6;
      --color-text-secondary: #b0ada6;
      --color-text-tertiary: #6a6860;
      --color-border-tertiary: rgba(255,255,255,0.08);
      --color-border-secondary: rgba(255,255,255,0.15);
      --color-border-primary: rgba(255,255,255,0.25);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--color-background-tertiary);
    min-height: 100vh;
    padding: 2rem;
  }

  .wrap { max-width: 680px; margin: 0 auto; }

  .section { margin-bottom: 24px; }
  .section:last-child { margin-bottom: 0; }

  .row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.05em;
  }

  .w {
    background: var(--color-background-primary);
    border-radius: 18px;
    border: 0.5px solid var(--color-border-secondary);
    display: flex;
    flex-direction: column;
    padding: 6px;
    overflow: hidden;
  }

  .w-sm  { width: 80px;  height: 80px;  }
  .w-md  { width: 160px; height: 80px;  }
  .w-lg  { width: 160px; height: 160px; }

  .dot {
    font-size: 9px;
    color: var(--color-text-tertiary);
    margin-bottom: 4px;
  }

  .line-full  { height: 1.5px; border-radius: 1px; background: var(--color-border-secondary); margin-bottom: 4px; }
  .line-half  { height: 1.5px; border-radius: 1px; background: var(--color-border-tertiary); margin-bottom: 4px; width: 70%; }
  .line-third { height: 1.5px; border-radius: 1px; background: var(--color-border-tertiary); margin-bottom: 4px; width: 45%; }
  .spacer     { flex: 1; }
  .line-xs    { height: 1px; background: var(--color-border-tertiary); margin-bottom: 3px; }
  .rule       { height: 0.5px; background: var(--color-border-tertiary); margin: 4px 0; }

  .spec {
    background: var(--color-background-secondary);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--color-text-secondary);
    line-height: 1.7;
    flex: 1;
  }

  .spec-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-tertiary);
    margin-right: 4px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- 小 2×2 -->
  <div class="section row">
    <div class="col">
      <div class="w w-sm">
        <div class="line-full"></div>
        <div class="line-half"></div>
        <div class="line-full"></div>
        <div class="spacer"></div>
      </div>
      <div class="label">小 · 2×2</div>
    </div>
    <div class="spec">
      <div class="spec-title">小组件</div>
      只显示名句本身，不显示出处、日期和宜忌。正方形，最精简。
      <br><br>
      <span class="tag">名句全文</span>
      <span class="tag">无出处</span>
      <span class="tag">无日期</span>
      <span class="tag">无宜忌</span>
      <span class="tag">无心情</span>
    </div>
  </div>

  <!-- 长条 4×2 -->
  <div class="section row">
    <div class="col">
      <div class="w w-md" style="flex-direction:row;align-items:center;gap:5px;padding:8px;">
        <div style="flex:1;display:flex;flex-direction:column;gap:3px;">
          <div class="line-full"></div>
          <div class="line-half"></div>
          <div class="line-full"></div>
        </div>
        <div style="width:1px;align-self:stretch;background:var(--color-border-tertiary);"></div>
        <div style="width:40px;display:flex;flex-direction:column;gap:5px;">
          <div style="display:flex;align-items:center;gap:3px;">
            <div style="width:10px;height:5px;border-radius:2px;background:#3B6D11;flex-shrink:0;"></div>
            <div style="flex:1;"><div class="line-xs"></div></div>
          </div>
          <div style="display:flex;align-items:center;gap:3px;">
            <div style="width:10px;height:5px;border-radius:2px;background:#854F0B;flex-shrink:0;"></div>
            <div style="flex:1;"><div class="line-xs"></div></div>
          </div>
        </div>
      </div>
      <div class="label">长条 · 4×2</div>
    </div>
    <div class="spec">
      <div class="spec-title">长条组件</div>
      名句 + 宜忌各一条，横向排列，无作者、无心情。
      <br><br>
      <span class="tag">名句全文</span>
      <span class="tag">宜 + 忌 各一条</span>
      <span class="tag">无作者</span>
      <span class="tag">无心情</span>
    </div>
  </div>

  <!-- 大 4×4 -->
  <div class="section row">
    <div class="col">
      <div class="w w-lg">
        <div class="dot">3月18日</div>
        <div class="line-full"></div>
        <div class="line-half"></div>
        <div class="line-full"></div>
        <div class="line-third"></div>
        <div class="spacer"></div>
        <div class="rule"></div>
        <div style="display:flex;gap:5px;margin-bottom:4px;">
          <div style="width:12px;height:6px;border-radius:2px;background:#3B6D11;flex-shrink:0;"></div>
          <div style="flex:1;"><div class="line-xs"></div><div class="line-xs" style="width:80%"></div></div>
        </div>
        <div style="display:flex;gap:5px;margin-bottom:6px;">
          <div style="width:12px;height:6px;border-radius:2px;background:#854F0B;flex-shrink:0;"></div>
          <div style="flex:1;"><div class="line-xs"></div><div class="line-xs" style="width:60%"></div></div>
        </div>
        <div style="display:flex;gap:3px;">
          <div style="flex:1;height:14px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);"></div>
          <div style="flex:1;height:14px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);"></div>
          <div style="flex:1;height:14px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);"></div>
          <div style="flex:1;height:14px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);"></div>
          <div style="flex:1;height:14px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);"></div>
        </div>
      </div>
      <div class="label">大 · 4×4</div>
    </div>
    <div class="spec">
      <div class="spec-title">大组件</div>
      完整版：日期、名句、作者、宜忌两条全显示，底部有心情选择条（五个小圆点）。
      <br><br>
      <span class="tag">日期</span>
      <span class="tag">名句全文</span>
      <span class="tag">作者</span>
      <span class="tag">宜 + 忌 各一条</span>
      <span class="tag">心情选择</span>
    </div>
  </div>

</div>
</body>
</html>
